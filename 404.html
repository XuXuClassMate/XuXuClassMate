        <footer class="footer">
            <div class="container">

                        <span class="logo-text">XuXuClassMate</span>

                                id="footerWechatBtn"

        <!-- WeChat QR Code Modal -->
        <div class="modal" id="wechatModal">
            <div class="modal-content">
                <button class="close-button" id="closeModal">×</button>
                <img src="images/wechat.jpg" alt="WeChat QR Code" />
            </div>
        </div>

        <script src="js/mobile-nav.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const modal = document.getElementById("wechatModal");
                const footerBtn = document.getElementById("footerWechatBtn");
                const closeBtn = document.getElementById("closeModal");

                function showModal(e) {
                    e.preventDefault();
                    modal.classList.add("show");
                }

                footerBtn.addEventListener("click", showModal);

                closeBtn.addEventListener("click", function () {
                    modal.classList.remove("show");
                });

                modal.addEventListener("click", function (e) {
                    if (e.target === modal) {
                        modal.classList.remove("show");
                    }
                });
            });
        </script>
    </body>
